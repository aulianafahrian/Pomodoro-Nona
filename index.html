<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Nona</title>
    <link rel="icon" href="assets/images/nona-cute.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
</head>

<body class="phase-idle">

    <!-- Spotlight Overlay -->
    <div id="spotlightOverlay"></div>

    <div class="app-wrapper">

        <header>
            <img src="assets/images/nona-cute.png" alt="Nona" class="header-avatar">
            <h1>Pomodoro Nona</h1>
        </header>

        <main>

            <!-- Phase Badge -->
            <div id="phaseBadge" class="phase-badge">Siap</div>

            <!-- Circular Timer -->
            <div class="timer-wrapper">
                <svg class="timer-ring" viewBox="0 0 220 220">
                    <circle class="ring-bg" cx="110" cy="110" r="95" />
                    <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="95" />
                </svg>
                <div class="timer-center">
                    <img id="nonaImg" class="nona-img" src="assets/images/nona-cute.png" alt="Nona">
                    <div id="timerDisplay" class="timer-digits">25:00</div>
                    <div id="cyclesCompleted" class="cycles-text">Siklus: 0</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="startButton" class="btn btn-start">▶ Mulai</button>
                <button id="pauseButton" class="btn btn-pause" style="display:none">⏸ Pause</button>
                <button id="resetButton" class="btn btn-reset">↺ Ulangi</button>
            </div>

            <!-- Settings Toggle -->
            <button id="settingsToggle" class="settings-toggle">⚙ Pengaturan</button>

            <!-- Settings Section -->
            <section id="settings" class="settings-panel collapsed">
                <div class="warning-text" id="saveSettingsWarning">Simpan pengaturan sebelum memulai timer.</div>
                <div class="setting-row">
                    <label for="adaptiveMode">
                        <input type="checkbox" id="adaptiveMode" checked>
                        Mode Adaptif (otomatis bagi waktu kerja)
                    </label>
                </div>
                <div class="setting-row">
                    <label for="workDuration">Durasi Kerja (menit)</label>
                    <input type="number" id="workDuration" value="60" min="1">
                </div>
                <div class="setting-row">
                    <label for="cycles">Jumlah Siklus (Otomatis)</label>
                    <input type="text" id="cycles" value="" disabled>
                </div>
                <button id="saveSettings" class="btn btn-save">💾 Simpan Pengaturan</button>
            </section>

            <!-- Plan Preview -->
            <div id="adaptivePlanPreview" class="plan-preview hidden">
                <h3>🧐 Rencana Siklus Adaptif</h3>
                <div id="planList" class="plan-list"></div>
            </div>

        </main>

        <footer>
            <p>Pomodoro Nona &nbsp;·&nbsp; est. 2025 &nbsp;·&nbsp; v.0.01</p>
        </footer>

    </div>

    <script type="module" src="assets/js/main.js"></script>
</body>

</html>
